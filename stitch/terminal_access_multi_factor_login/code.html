<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PROJECT CITADEL - AUTHENTICATION</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&amp;family=JetBrains+Mono:wght@400;700&amp;family=Space+Grotesk:wght@300;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        /* Custom dot mask for the access token input */
        .password-dots {
            -webkit-text-security: disc;
        }
        /* Architectural Absolute: No scroll, full viewport focus */
        body {
            overflow: hidden;
            background-color: #131313;
        }
    </style>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "background": "#131313",
              "inverse-surface": "#e2e2e2",
              "tertiary-container": "#909191",
              "primary-fixed": "#5d5f5f",
              "primary": "#ffffff",
              "on-error-container": "#ffdad6",
              "surface-tint": "#c6c6c7",
              "on-secondary-fixed": "#1a1c1c",
              "surface-container-lowest": "#0e0e0e",
              "on-primary-container": "#000000",
              "surface": "#131313",
              "surface-container-low": "#1b1b1b",
              "error": "#ffb4ab",
              "surface-dim": "#131313",
              "primary-container": "#d4d4d4",
              "on-tertiary-container": "#000000",
              "on-primary": "#1a1c1c",
              "on-secondary": "#1a1c1c",
              "inverse-primary": "#5d5f5f",
              "on-secondary-container": "#e2e2e2",
              "outline-variant": "#474747",
              "inverse-on-surface": "#303030",
              "on-tertiary-fixed-variant": "#e2e2e2",
              "on-background": "#e2e2e2",
              "surface-container": "#1f1f1f",
              "tertiary-fixed-dim": "#454747",
              "surface-container-highest": "#353535",
              "tertiary": "#e2e2e2",
              "on-primary-fixed": "#ffffff",
              "secondary": "#c6c6c7",
              "secondary-container": "#454747",
              "on-secondary-fixed-variant": "#3a3c3c",
              "surface-container-high": "#2a2a2a",
              "surface-bright": "#393939",
              "surface-variant": "#353535",
              "secondary-fixed": "#c6c6c7",
              "on-primary-fixed-variant": "#e2e2e2",
              "tertiary-fixed": "#5d5f5f",
              "on-surface-variant": "#c6c6c6",
              "outline": "#919191",
              "on-surface": "#e2e2e2",
              "on-error": "#690005",
              "secondary-fixed-dim": "#aaabab",
              "primary-fixed-dim": "#454747",
              "on-tertiary": "#1a1c1c",
              "on-tertiary-fixed": "#ffffff",
              "error-container": "#93000a"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Space Grotesk"],
              "mono": ["JetBrains Mono"]
            },
            borderRadius: {"DEFAULT": "0px", "lg": "0px", "xl": "0px", "full": "9999px"},
          },
        },
      }
    </script>
</head>
<body class="bg-background text-on-surface font-body selection:bg-primary selection:text-on-primary">
<!-- Background Layer (The Floor) -->
<main class="relative min-h-screen flex flex-col items-center justify-center px-6 overflow-hidden">
<!-- Subtle Architectural Texture (Optional but adds depth) -->
<div class="absolute inset-0 opacity-[0.03] pointer-events-none" style="background-image: linear-gradient(#ffffff 1px, transparent 1px), linear-gradient(90deg, #ffffff 1px, transparent 1px); background-size: 100px 100px;"></div>
<!-- Login Container -->
<section class="w-full max-w-md flex flex-col items-center relative z-10">
<!-- Minimalist Geometric Logo -->
<div class="mb-12">
<div class="w-16 h-16 border-2 border-primary flex items-center justify-center p-2">
<div class="w-full h-full border border-primary flex items-center justify-center">
<span class="material-symbols-outlined text-3xl" data-icon="shield">shield</span>
</div>
</div>
</div>
<!-- Header Section -->
<div class="text-center mb-16 space-y-2">
<h1 class="text-4xl md:text-5xl font-black font-headline tracking-tighter text-primary uppercase">
                    TERMINAL_ACCESS
                </h1>
<p class="text-xs font-mono tracking-[0.3em] text-on-surface-variant uppercase">INPUT_CREDENTIALS_AND_TOKEN</p>
</div>
<!-- Authentication Form -->
<form class="w-full space-y-12"><div class="space-y-8">
<div class="relative group">
<label class="block text-[10px] font-mono tracking-widest text-on-surface-variant mb-2 uppercase" for="email-address">
            EMAIL_ADDRESS
        </label>
<input class="w-full bg-transparent border-t-0 border-x-0 border-b border-outline-variant focus:border-primary focus:ring-0 text-primary font-mono text-xl tracking-widest py-3 px-0 transition-colors placeholder:text-surface-container-highest uppercase" id="email-address" placeholder="USER@CITADEL.SYSTEM" required="" type="email"/>
</div>
<div class="relative group">
<label class="block text-[10px] font-mono tracking-widest text-on-surface-variant mb-2 uppercase" for="user-password">
            USER_PASSWORD
        </label>
<input class="w-full bg-transparent border-t-0 border-x-0 border-b border-outline-variant focus:border-primary focus:ring-0 text-primary font-mono text-xl tracking-widest py-3 px-0 transition-colors placeholder:text-surface-container-highest password-dots" id="user-password" placeholder="••••••••" required="" type="password"/>
</div>
<div class="relative group">
<label class="block text-[10px] font-mono tracking-widest text-on-surface-variant mb-2 uppercase" for="access-token">
            ACCESS_TOKEN
        </label>
<input class="w-full bg-transparent border-t-0 border-x-0 border-b border-outline-variant focus:border-primary focus:ring-0 text-primary font-mono text-xl tracking-widest py-3 px-0 transition-colors placeholder:text-surface-container-highest password-dots" id="access-token" placeholder="••••••••••••" required="" type="password"/>
</div>
</div>
<button class="group relative w-full bg-primary text-on-primary font-headline font-bold text-sm tracking-widest py-5 flex items-center justify-center transition-all duration-100 active:scale-[0.98] uppercase mt-12" type="submit">
    INITIATE_SESSION
    <span class="material-symbols-outlined ml-3 text-lg transition-transform group-hover:translate-x-1" data-icon="arrow_forward">arrow_forward</span>
</button></form>
</section>
<!-- Technical Metadata Footer -->
<footer class="absolute bottom-0 w-full p-8 flex flex-col md:flex-row justify-between items-center gap-4">
<!-- Metadata Left -->
<div class="flex flex-col items-start gap-1">
<div class="flex items-center gap-2">
<span class="w-1.5 h-1.5 bg-primary block"></span>
<span class="text-[10px] font-mono text-on-surface-variant tracking-wider uppercase">ENCRYPTION: AES_256_GCM</span>
</div>
<div class="flex items-center gap-2">
<span class="w-1.5 h-1.5 border border-outline-variant block"></span>
<span class="text-[10px] font-mono text-on-surface-variant tracking-wider uppercase">NODE_ID: ORBITAL_07</span>
</div>
</div>
<!-- Disclaimer Center (Desktop) / Bottom (Mobile) -->
<div class="md:absolute md:left-1/2 md:-translate-x-1/2 md:bottom-8">
<p class="text-[9px] font-mono text-outline uppercase tracking-[0.2em] opacity-60">
                    UNAUTHORIZED ACCESS IS STRICTLY PROHIBITED
                </p>
</div>
<!-- Metadata Right -->
<div class="hidden md:flex flex-col items-end gap-1">
<span class="text-[10px] font-mono text-on-surface-variant tracking-wider uppercase">LATENCY: 0.4MS</span>
<span class="text-[10px] font-mono text-on-surface-variant tracking-wider uppercase">LOC: CLASSIFIED</span>
</div>
</footer>
<!-- Decorative Architectural Frame Corner -->
<div class="absolute top-0 left-0 w-32 h-32 border-t border-l border-outline-variant/30 pointer-events-none"></div>
<div class="absolute bottom-0 right-0 w-32 h-32 border-b border-r border-outline-variant/30 pointer-events-none"></div>
</main>
</body></html>
